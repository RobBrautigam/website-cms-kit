<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Website CMS Kit — Admin login (demo)</title>
<style>
  :root{
    --bg-primary:#f8fafc; --bg-white:#ffffff; --bg-card:#f1f5f9; --bg-elevated:#e2e8f0;
    --text-primary:#0f172a; --text-secondary:#475569; --text-muted:#94a3b8;
    --accent:#2563eb; --accent-hover:#1d4ed8; --accent-glow:rgba(37,99,235,.35);
    --border:#e2e8f0;
    --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--font); color:var(--text-primary);
    background:linear-gradient(to bottom,#ffffff 0%,#ffffff 55%,var(--bg-card) 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:48px 20px; -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%; max-width:384px}
  .brand{display:flex; flex-direction:column; align-items:center; margin-bottom:32px}
  .mark{color:var(--accent)}
  .wordmark{margin-top:18px; font-size:11px; font-weight:800; letter-spacing:.22em; color:rgba(71,85,105,.8); text-transform:uppercase}
  h1{margin:12px 0 0; font-size:24px; font-weight:900; letter-spacing:-.02em; text-align:center}
  .sub{margin:8px 0 0; font-size:14px; color:var(--text-secondary); text-align:center; max-width:18rem}
  .cardform{
    border:1px solid var(--border); background:var(--bg-white); border-radius:16px; padding:28px;
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px -12px rgba(0,0,0,.06);
  }
  label{display:block; font-size:14px; font-weight:600; color:var(--text-secondary); margin-bottom:6px}
  .field{margin-bottom:20px}
  input[type=email],input[type=password],input[type=text]{
    width:100%; padding:12px 16px; border:1px solid var(--border); background:var(--bg-card);
    border-radius:10px; font-size:15px; color:var(--text-primary); font-family:inherit;
  }
  input:focus{outline:none; box-shadow:0 0 0 2px var(--accent)}
  .pw{position:relative}
  .pw input{padding-right:44px}
  .eye{position:absolute; top:0; right:0; height:100%; width:44px; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); background:none; border:0; cursor:pointer}
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px}
  .remember{display:flex; align-items:center; gap:8px; font-size:14px; color:var(--text-secondary); cursor:pointer; user-select:none}
  .remember input{width:16px; height:16px; accent-color:var(--accent)}
  .link{font-size:14px; color:var(--text-secondary); text-decoration:none}
  .link:hover{color:var(--accent)}
  .btn{
    width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--accent); color:#fff; font-weight:700; font-size:16px; padding:13px 24px;
    border:0; border-radius:8px; cursor:pointer; transition:all .2s ease;
  }
  .btn:hover{background:var(--accent-hover); box-shadow:0 0 24px var(--accent-glow)}
  .foot{margin-top:24px; display:flex; align-items:center; justify-content:space-between; font-size:11px; color:rgba(71,85,105,.5)}
  .foot a{color:inherit; text-decoration:none}
  .foot a:hover{color:var(--accent)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg class="mark" width="56" height="56" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="6" fill="currentColor" opacity="0.12"/>
        <path d="M7 16 L12 7 L17 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="9.2" y1="13.2" x2="14.8" y2="13.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p class="wordmark">Acme</p>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to the Acme admin. Invite-only, with two-factor authentication.</p>
    </div>

    <form class="cardform" onsubmit="return false">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" value="ada@example.com" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw">
          <input id="password" type="password" value="supersecret12" placeholder="••••••••" />
          <button type="button" class="eye" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="row">
        <label class="remember"><input type="checkbox" checked /> Remember me for 30 days</label>
        <a class="link" href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="foot">
      <a href="#">← example.com</a>
      <span class="mono">v1.0.0</span>
    </div>
  </div>
</body>
</html>
